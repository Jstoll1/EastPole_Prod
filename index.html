<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="East Pole Golf">
<title>East Pole Golf Pool</title>
<style>
:root  {
  --green: #2d6a4f;
  --green-light: #40916c;
  --green-bright: #52b788;
  --gold: #d4a843;
  --gold-dim: rgba(212,168,67,0.5);
  --gold-bg: rgba(212,168,67,0.08);
  --red: #d9534f;
  --bg: #06120c;
  --card: #0c1e14;
  --card2: #112a1b;
  --text: #eaf2ec;
  --text2: #6b9e78;
  --text3: #3a6148;
  --border: #1a3326;
  --safe-top: env(safe-area-inset-top, 47px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
  --header-h: 54px;
  --nav-h: 56px;
}

*, *::before, *::after  {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body  {
  height: 100%;
  width: 100%;
  background: var(--bg);
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  color: var(--text);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

#hdr  {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: linear-gradient(180deg, #1a4430 0%, #143828 100%);
  padding-top: var(--safe-top);
  border-bottom: 1.5px solid var(--gold);
}

.hdr-inner  {
  height: var(--header-h);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 5px 14px 6px;
  gap: 5px;
}

.hdr-row1  {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.hdr-brand  {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  flex-shrink: 0;
}

.hdr-row2  {
  display: flex;
  align-items: center;
}

.hdr-pill  {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(212,168,67,0.25);
  border-radius: 20px;
  padding: 5px 9px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2px;
  color: rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.hdr-pill .live-dot  {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  flex-shrink: 0;
}

.hdr-pill .live-dot.on  {
  background: #34c759;
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse  {
  0%,100% {
  opacity:1
}

50% {
  opacity:0.4
}
}

#views  {
  position: fixed;
  top: calc(var(--header-h) + var(--safe-top) + 1px);
  bottom: calc(var(--nav-h) + var(--safe-bot));
  left: 0;
  right: 0;
  overflow: hidden;
}

.view  {
  display: none;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.view.active  {
  display: block;
}

#nav  {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: linear-gradient(180deg, #143828 0%, #102e20 100%);
  border-top: 1px solid rgba(212,168,67,0.3);
  padding-bottom: var(--safe-bot);
  height: calc(var(--nav-h) + var(--safe-bot));
  display: flex;
}

.nav-btn  {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  cursor: pointer;
  color: rgba(255,255,255,0.3);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding-top: 4px;
  transition: color 0.2s;
}

.nav-btn svg  {
  width: 22px;
  height: 22px;
  stroke-width: 1.8;
  fill: none;
  stroke: currentColor;
}

.nav-btn.active  {
  color: var(--gold);
}

.section-pad  {
  padding: 0 0 100px;
}

.section-title  {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
  padding: 20px 18px 10px;
}

.divider  {
  height: 1px;
  background: var(--border);
  margin: 0;
}

.payout-card  {
  flex: 1;
  background: rgba(201,168,76,0.07);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  padding: 10px 8px 8px;
  text-align: center;
}

.payout-card .pc-lbl  {
  font-size: 10px;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

.payout-card .pc-amt  {
  font-size: 20px;
  font-weight: 900;
  color: #f5c518;
  margin: 4px 0 3px;
}

.payout-card .pc-who  {
  font-size: 10px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.api-bar  {
  margin: 10px 14px 0;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text2);
}

.standing-row  {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(26,51,38,0.6);
  cursor: pointer;
  gap: 0;
  transition: background 0.15s;
}

.standing-row:nth-child(odd)  {
  background: var(--bg);
}

.standing-row:nth-child(even)  {
  background: rgba(12,30,20,0.7);
}

.standing-row:active  {
  background: var(--card2);
}

.s-rank  {
  width: 40px;
  font-size: 15px;
  font-weight: 800;
  flex-shrink: 0;
  text-align: left;
  color: var(--text3);
}

.s-info  {
  flex: 1;
  min-width: 0;
}

.s-team  {
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
  letter-spacing: -0.2px;
}

.s-email  {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.s-score  {
  font-size: 20px;
  font-weight: 900;
  width: 52px;
  text-align: right;
  flex-shrink: 0;
}

.s-top4  {
  font-size: 9px;
  color: var(--text3);
  text-align: right;
  width: 56px;
  flex-shrink: 0;
  padding-right: 4px;
  letter-spacing: 0.3px;
}

.s-arrow  {
  color: var(--text3);
  font-size: 14px;
  flex-shrink: 0;
  margin-left: 6px;
}

.neg  {
  color: var(--gold);
}

.pos  {
  color: var(--red);
}

.eve  {
  color: var(--text2);
}

.picks-panel  {
  display: none;
  border-bottom: 1px solid #0d1f12;
}

.picks-panel.open  {
  display: block;
}

.mini-pick  {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px 8px 60px;
  border-bottom: 1px solid #0d1f12;
  font-size: 14px;
}

.mini-pick:nth-child(odd)  {
  background: rgba(6,18,12,0.9);
}

.mini-pick:nth-child(even)  {
  background: rgba(10,24,16,0.9);
}

.mini-pick:last-child  {
  border-bottom: none;
}

.mini-pick.is-top  {
  background: var(--gold-bg) !important;
  border-left: 2px solid rgba(212,168,67,0.35);
}

.mini-pick-left  {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 0;
}

.star  {
  font-size: 9px;
  color: var(--gold);
}

.mini-pick-name  {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #e0eee2;
}

.mini-pick-pos  {
  font-size: 10px;
  color: #4a8054;
  margin-left: 4px;
  flex-shrink: 0;
}

.mini-pick-score  {
  font-size: 14px;
  font-weight: 800;
  flex-shrink: 0;
}

.seg-wrap  {
  padding: 0 14px 8px;
}

.seg  {
  display: flex;
  background: rgba(12,30,20,0.6);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 2px;
  overflow: hidden;
}

.seg-btn  {
  flex: 1;
  padding: 6px 4px;
  font-size: 11px;
  font-weight: 700;
  border: none;
  background: none;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text3);
  font-family: inherit;
  transition: all 0.18s;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

.seg-btn.active  {
  background: rgba(212,168,67,0.15);
  color: var(--gold);
}

.seg-team-a  {
  color: #5BC8F5;
}

.seg-team-b  {
  color: #FF7F7F;
}

.seg-team-a.active  {
  background: rgba(91,200,245,0.15);
  color: #5BC8F5;
}

.seg-team-b.active  {
  background: rgba(255,127,127,0.15);
  color: #FF7F7F;
}

.lb-sticky-hdr  {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

.lb-top-row  {
  display: flex;
  align-items: center;
  padding: 10px 14px 2px;
}

.lb-round-label  {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
}

.tv-header  {
  background: linear-gradient(180deg, #1a4d2e 0%, #0e2a18 100%);
  padding: 0;
  text-align: center;
  overflow: hidden;
}

.tv-header-top  {
  background: linear-gradient(180deg, #6b1c1c 0%, #4a1414 100%);
  padding: 6px 18px 5px;
  border-bottom: 3px solid var(--gold);
}

.tv-header-top .tv-title  {
  color: #fff;
}

.tv-header-bot  {
  display: none;
}

.tv-title  {
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
}

.tv-sub  {
  font-size: 9px;
  color: var(--gold-dim);
  margin-top: 2px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-weight: 500;
}

.tv-col-hdr  {
  display: flex;
  align-items: center;
  padding: 4px 14px;
  background: rgba(6,18,12,0.95);
  border-bottom: 1px solid var(--border);
  font-size: 8px;
  font-weight: 800;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.tv-tot-col-hdr  {
  width: 48px;
  text-align: center;
  background: rgba(110,22,22,0.6);
  border-left: 1.5px solid rgba(160,40,40,0.55);
  margin: -4px 0;
  padding: 4px 0;
  color: rgba(255,255,255,0.65) !important;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tv-col-hdr .today-hdr  {
  background: var(--gold);
  color: #0a1a10;
  padding: 2px 6px;
  border-radius: 2px;
  font-size: 7px;
  font-weight: 900;
  letter-spacing: 1.2px;
}

.tv-row  {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(26,51,38,0.4);
  border-left: 2px solid transparent;
}

.tv-row:nth-child(odd)  {
  background: var(--bg);
}

.tv-row:nth-child(even)  {
  background: rgba(12,30,20,0.5);
}

.tv-row.tv-prev-winner  {
  background: rgba(212,168,67,0.06) !important;
  border-left: 2px solid var(--gold);
}

.prev-winner-badge  {
  display: inline-flex;
  align-items: center;
  background: var(--gold);
  color: #0a1a10;
  font-size: 7.5px;
  font-weight: 900;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding: 2px 5px;
  border-radius: 3px;
  margin-left: 5px;
  vertical-align: middle;
  white-space: nowrap;
  flex-shrink: 0;
}

.tv-row.tv-mc  {
  opacity: 0.5;
  background: rgba(80,10,10,0.25) !important;
  border-left: 2px solid rgba(180,40,40,0.5);
}

.tv-pos  {
  width: 32px;
  font-size: 13px;
  font-weight: 800;
  color: var(--text2);
  flex-shrink: 0;
}

.tv-row.tv-mc .tv-pos  {
  color: #c0392b;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.5px;
}

.tv-row.tv-mc .tv-name  {
  color: rgba(255,255,255,0.5);
}

.tv-player  {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: baseline;
  gap: 0;
}

.tv-name  {
  font-size: 13px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tv-country  {
  font-size: 9px;
  font-weight: 600;
  color: var(--text3);
  margin-left: 5px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.tv-pool-dot  {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  margin-left: 4px;
  vertical-align: middle;
  flex-shrink: 0;
}

.tv-topar  {
  width: 48px;
  font-size: 16px;
  font-weight: 900;
  text-align: center;
  flex-shrink: 0;
  background: rgba(110,22,22,0.5);
  border-left: 1.5px solid rgba(160,40,40,0.55);
  margin: -8px 0;
  padding: 8px 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tv-topar.neg  {
  color: var(--gold);
}

.tv-topar.pos  {
  color: #ff6b6b;
}

.tv-topar.eve  {
  color: rgba(255,255,255,0.7);
}

.tv-topar.mc  {
  color: #ff6b6b;
  font-size: 11px;
  font-weight: 800;
}

.tv-rnd-score  {
  width: 32px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-align: right;
  flex-shrink: 0;
}

.tv-today  {
  width: 36px;
  font-size: 13px;
  font-weight: 700;
  text-align: right;
  flex-shrink: 0;
}

.tv-today.neg  {
  color: var(--gold);
}

.tv-today.pos  {
  color: var(--red);
}

.tv-today.eve  {
  color: var(--text2);
}

.tv-tee  {
  width: 68px !important;
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  text-align: right;
}

.own-row  {
  padding: 12px 16px;
  border-bottom: 1px solid #0d1f12;
}

.own-row:nth-child(odd)  {
  background: #091410;
}

.own-row:nth-child(even)  {
  background: #0b1812;
}

.own-row:last-child  {
  border-bottom: none;
}

.own-hdr  {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.own-name  {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
}

.own-right  {
  display: flex;
  align-items: center;
  gap: 10px;
}

.own-pct  {
  font-size: 14px;
  font-weight: 900;
  color: var(--gold);
}

.own-score-tag  {
  font-size: 13px;
  font-weight: 800;
}

.own-bar-bg  {
  background: #0d1f12;
  border-radius: 5px;
  height: 5px;
  overflow: hidden;
}

.own-bar  {
  background: linear-gradient(90deg, var(--green), var(--gold));
  height: 100%;
  border-radius: 5px;
}

.own-sub  {
  font-size: 10px;
  color: #4a8054;
  margin-top: 4px;
}

.search-bar  {
  margin: 14px 14px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
}

.search-bar svg  {
  width: 18px;
  height: 18px;
  color: var(--text3);
  flex-shrink: 0;
}

.search-bar input  {
  border: none;
  background: none;
  font-size: 17px;
  flex: 1;
  outline: none;
  color: var(--text);
  font-family: inherit;
}

.search-bar input::placeholder  {
  color: var(--text3);
}

.team-card  {
  margin: 14px 14px 0;
  background: linear-gradient(145deg, #0f2016, #0c1a10);
  border: 1px solid #1e3d28;
  border-radius: 16px;
  padding: 18px;
}

.team-card h2  {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.4px;
}

.team-card .tc-email  {
  font-size: 13px;
  color: var(--text2);
  margin-top: 3px;
}

.tc-stats  {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.tc-stat  {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px 10px;
}

.tc-val  {
  font-size: 26px;
  font-weight: 800;
}

.tc-lbl  {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}

.picks-card  {
  margin: 10px 12px 0;
  overflow: hidden;
  border-radius: 12px;
  border: 1px solid #1c3824;
}

.pick-row  {
  display: flex;
  align-items: center;
  padding: 11px 14px;
  border-bottom: 1px solid #0d1f12;
  gap: 10px;
}

.pick-row:nth-child(odd)  {
  background: #091410;
}

.pick-row:nth-child(even)  {
  background: #0b1812;
}

.pick-row:last-child  {
  border-bottom: none;
}

.pick-n  {
  width: 22px;
  font-size: 12px;
  color: #4a8054;
  font-weight: 700;
  flex-shrink: 0;
}

.pick-info  {
  flex: 1;
  min-width: 0;
}

.pick-name  {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
}

.pick-pos  {
  font-size: 11px;
  color: #4a8054;
  margin-top: 2px;
}

.pick-badge  {
  font-size: 9px;
  font-weight: 800;
  background: var(--gold);
  color: #0a1a10;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
  letter-spacing: 0.3px;
}

.pick-score  {
  font-size: 20px;
  font-weight: 900;
  flex-shrink: 0;
}

#splash  {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 999;
  background-color: #06120c;
  background-image: url('https://photo-assets.masters.com/images/pics/tablet/m_mag_lane_wide.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.5s ease;
}

#splash::before  {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.5) 100%);
  z-index: 1;
}

#splash.hidden  {
  opacity: 0;
  pointer-events: none;
}

.splash-content  {
  text-align: center;
  animation: splashFade 0.8s ease 0.2s both;
  position: relative;
  z-index: 2;
}

.splash-header  {
  background: linear-gradient(90deg, rgba(20, 56, 40, 0.88), rgba(14, 42, 24, 0.88));
  border-bottom: 2px solid #c9a84c;
  padding: 7px 28px;
  margin-bottom: 16px;
  border-radius: 8px;
  backdrop-filter: blur(10px);
}

.splash-title  {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 4px;
  color: #c9a84c;
  text-transform: uppercase;
  margin: 0;
  white-space: nowrap;
}

.splash-branding  {
  margin: 14px 0 12px;

  return parseInt(String(pos).replace('T','')) || null;

const isPrevWinner = isPreT && p.name === PREV_WINNER; rows += `<div class="tv-row${mc?' tv-mc':''}${isMyPick?' is-my-team':''}${isPrevWinner?' tv-prev-winner':''}"> <div class="tv-pos" style="display:flex;flex-direction:column;align-items:flex-start;justify-content:center"> <span>${mc?'MC':p.pos}</span> ${moveHtml} </div> <div class="tv-pill-slot">${pills}</div> <div class="tv-player"> <span class="tv-name ${isMyPick?'is-my-pick':''}">${p.name}</span> <span class="tv-country">${flag}${cc?' '+cc:''}</span> ${isPrevWinner?'<span class="prev-winner-badge">Def. Champion</span>':''} ${inPool&&!isMyPick?'<span class="tv-pool-dot"></span>':''} </div> <div class="tv-topar ${scClass}">${preT?'E':mc?'MC':scf}</div> ${preT ? `<div class="tv-today tv-tee">${teeStr||'—'}</div>` : `<div class="tv-rnd-score">${curRndScore||'—'}</div><div class="tv-today ${todayCls}">${mc?'':todayStr}</div>`} </div>`; }); document.getElementById('leaderboard-list').innerHTML = colHdr + rows;}

let ownFilter='most';

function setOwnFilter(f,btn) {
  ownFilter=f;
  document.querySelectorAll('#view-ownership .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOwnership();
}

function renderOwnership() { const gdMap={}; Object.entries(GOLFER_SCORES).forEach(([n,g])=>gdMap[n]=g);
let data=[...OWNERSHIP_DATA]; if (!data.length) { document.getElementById('ownership-list').innerHTML='<div class="empty-state">No entries yet</div>'; return; }

const maxPct=data[0].pct; if (ownFilter==='least') data=[...data].sort((a,b)=>a.pct-b.pct); document.getElementById('ownership-list').innerHTML = data.map(d=>{ const gd = gdMap[d.player];
const sc = gd?.score;
const pos = gd?.pos || '—';
const scf = sc!==undefined ? fmt(sc) : '—';
const scc = sc!==undefined ? cls(sc) : 'eve';
const mc = gd?.thru === 'MC';
const flag = FLAGS[d.player] || '';
const posStr = mc ? 'MC' : (pos !== '—' ? pos : ''); return `<div class="own-row"> <div class="own-hdr"> <div style="display:flex;align-items:baseline;gap:6px;min-width:0"> <span class="own-name">${flag} ${d.player}</span> ${posStr ? `<span style="font-size:10px;color:var(--text3);font-weight:600;flex-shrink:0">${posStr}</span>` : ''} </div> <div class="own-right"> <span class="own-score-tag ${scc}">${scf}</span> <span class="own-pct">${(d.pct*100).toFixed(0)}%</span> </div> </div> <div class="own-bar-bg"><div class="own-bar" style="width:${(d.pct/maxPct*100).toFixed(1)}%"></div></div> <div class="own-sub">${d.entries} of ${ENTRIES.length} entries · ${d.entries===ENTRIES.length?'Everyone':'Unique pick'}</div> </div>`; }).join('');}

function computeOwnership() { if (!ENTRIES.length) return [];
const counts = {}; ENTRIES.forEach(e => e.picks.forEach(p => { counts[p] = (counts[p]||0) + 1; })); return Object.entries(counts) .map(([player, entries]) => ({ player, entries, pct: entries / ENTRIES.length })) .sort((a,b) => b.pct - a.pct);}

let OWNERSHIP_DATA = computeOwnership();
let obSelectedEmail = null;

function buildObList(filter = '') { const people = {}; ENTRIES.forEach(e => { if (!people[e.email]) people[e.email] = { name: e.name || e.email, email: e.email, teams: [] }; people[e.email].teams.push(e.team); });
const list = Object.values(people) .filter(p => !filter || p.name.toLowerCase().includes(filter.toLowerCase())) .sort((a,b) => a.name.localeCompare(b.name));
const el = document.getElementById('ob-list'); if (!list.length) { el.innerHTML = '<div class="empty-state">No results</div>'; return; } el.innerHTML = list.map(p => { const isSelected = p.email === obSelectedEmail;
const teamItems = p.teams.map((t, i) => ` <div class="ob-team-indicator" style="display:flex;align-items:center;gap:8px;padding:10px 18px 10px 24px;border-bottom:1px solid rgba(26,51,38,0.4);"> <span class="team-pill ${PILL_CLASSES[i] || ''}" style="width:20px;height:16px;font-size:9px">${pillLabel(i)}</span> <span style="font-size:14px;color:var(--text)">${t}</span> </div>`).join(''); return ` <div class="ob-name-block${isSelected?' selected':''}" id="ob-block-${p.email.replace(/[@.]/g,'_')}"> <button class="ob-name-btn ${isSelected?'open':''}" onclick="obSelectName('${p.email}')"> <span>${p.name}</span> <span class="ob-name-right"> <span class="ob-entry-count">${p.teams.length} ${p.teams.length===1?'entry':'entries'}</span> <span class="ob-chevron">›</span> </span> </button> <div class="ob-teams-list ${isSelected?'open':''}"> ${teamItems} </div> </div>`; }).join('');}

function obSelectName(email) {
  obSelectedEmail = email;
  buildObList(document.getElementById('ob-search').value);
  document.getElementById('ob-confirm').classList.add('ready');
  const blockId = 'ob-block-' + email.replace(/[@.]/g,'_');
  setTimeout(() => { const el = document.getElementById(blockId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest'
}); }, 50);}

function filterObNames() { buildObList(document.getElementById('ob-search').value);}

function confirmOnboarding() {
  if (!obSelectedEmail) return;
  hideOnboarding();
  try { setUser(obSelectedEmail, 0, true);
  showToast('✓ Team locked in');
} catch(e) { console.error('setUser error:', e); }}

async function fetchESPN() {
  try { const res=await fetch('https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga');
  if (!res.ok) throw new Error();
  const data=await res.json();
  const comps=data.events?.[0]?.competitions?.[0]?.competitors||[];
  if (!comps.length) throw new Error();
  const evStatus=data.events?.[0]?.status?.type?.name||'';
  const isPreTournament=evStatus==='STATUS_SCHEDULED';
  const fullName = data.events[0].name || 'Houston Open';
  const parts = fullName.split(' ');
  const openIdx = parts.findIndex(w => w.toLowerCase() === 'open');
  const shortName = openIdx > 0 ? parts.slice(Math.max(0, openIdx-1), openIdx+1).join(' ') : fullName;
  const hdrSub = document.getElementById('hdr-sub');
  if (hdrSub) hdrSub.textContent = shortName + (isPreTournament ? ' · Pre-Tournament' : ' · Live');
  Object.entries(GOLFER_SCORES).forEach(([n,d]) => { const p = parsePos(d.pos);
  if (p) PREV_POSITIONS[n] = p;
});
const freshScores = {}; comps.forEach(c=>{ const name=c.athlete?.displayName; if(!name) return;
const state=c.status?.type?.name||'';
const scheduled=state==='STATUS_SCHEDULED';
const mc=state.includes('CUT')||false;
const scoreDisp=c.score?.displayValue||'0';
const score=scheduled?0:(scoreDisp==='E'||scoreDisp==='-'?0:parseInt(scoreDisp.replace('+',''))||0);
const lines=c.linescores||[];
const teeTime=c.status?.teeTime||'';
const thruRaw=c.status?.thru;
const thru=mc?'MC':(scheduled?'—':(thruRaw>0?String(thruRaw):(c.status?.displayValue||'F'))); freshScores[name]={ pos:scheduled?'—':(c.status?.position?.displayName||'—'), score:mc?11:score, thru:thru, teeTime:teeTime, r1:lines[0]?.value||null, r2:lines[1]?.value||null, r3:lines[2]?.value||null, r4:lines[3]?.value||null }; }); GOLFER_SCORES = freshScores; lastFetchTime = Date.now(); setApiStatus(isPreTournament ? 'scheduled' : 'live', isPreTournament ? 'Pre-Tournament' : 'Live'); console.log('✅ ESPN API returned', Object.keys(GOLFER_SCORES).length, 'golfers'); renderAll(); } catch(e) { console.log('❌ ESPN API error:', e.message); if (Object.keys(GOLFER_SCORES).length === 0) { Object.keys(FLAGS).forEach(name => { GOLFER_SCORES[name] = { pos:'—', score:0, thru:'—', teeTime:'TBD', r1:null, r2:null, r3:null, r4:null }; }); console.log('⚠️ Seeded', Object.keys(GOLFER_SCORES).length, 'golfers from FLAGS (offline fallback)'); } setApiStatus('cached', 'Offline'); renderAll(); }}

function setApiStatus(state, text) {
  _lastStatusText = text;
  const dot=document.getElementById('live-dot');
  dot.className='live-dot'+(state==='live'?' on':'');
  document.getElementById('hdr-status').textContent=text;
}

function refreshData() { setApiStatus('','Refreshing…'); fetchESPN();}

let _autoRefresh = null;

function startAutoRefresh() {
  if (_autoRefresh) return;
  _autoRefresh = setInterval(() => { console.log('🔄 Auto-refresh…');
  fetchESPN();
}, 60000);}

function stopAutoRefresh() { clearInterval(_autoRefresh); _autoRefresh = null; }

let _lastStatusText = 'Loading…';

function startAgeTimer() {
  setInterval(() => { if (!lastFetchTime) return;
  const s = Math.floor((Date.now() - lastFetchTime) / 1000);
  const age = s >= 45 ? (s < 60 ? ` · ${s
}s ago` : ` · ${Math.floor(s/60)}m ago`) : '';
const el = document.getElementById('hdr-status'); if (el) el.textContent = _lastStatusText + age; }, 5000);}

function switchTab(name,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
}

let toastT;

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

function renderAll() { renderStandings(); renderLeaderboard(); renderOwnership(); }

function updateHeaderDisplay() {
  const teamDisplay = document.getElementById('hdr-team-display');
  const joinBtn = document.getElementById('hdr-join-btn');
  const nameEl = document.getElementById('hdr-active-team');
  const caret = document.getElementById('hdr-dd-caret');
  if (currentUserEmail && currentUserTeams.length) { const activeTeam = activeTeamIdx >= 0 ? currentUserTeams[activeTeamIdx] : null;
  nameEl.textContent = activeTeam ? activeTeam.team : 'All Picks';
  if (caret) caret.style.display = currentUserTeams.length > 1 ? 'inline' : 'none';
  teamDisplay.style.display = 'block';
  joinBtn.style.display = 'none';
} else { teamDisplay.style.display = 'none'; joinBtn.style.display = 'block'; closeTeamDropdown(); }}

let _teamDdOpen = false;

function toggleTeamDropdown() {
  if (!currentUserTeams.length) return;
  if (currentUserTeams.length === 1) { showOnboarding();
  return;
} _teamDdOpen ? closeTeamDropdown() : openTeamDropdown();}

function openTeamDropdown() {
  _teamDdOpen = true;
  const list = document.getElementById('team-dropdown-list');
  list.innerHTML = ` <button class="td-item${activeTeamIdx === -1 ? ' active' : ''
}" onclick="event.stopPropagation();selectTeamEntry(-1)"> <span style="width:18px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;opacity:0.5">⊕</span> <span>All Picks</span> </button>` + currentUserTeams.map((t, i) => ` <button class="td-item${i === activeTeamIdx ? ' active' : ''}" onclick="event.stopPropagation();selectTeamEntry(${i})"> <span class="team-pill ${PILL_CLASSES[i] || ''}" style="width:18px;height:14px;font-size:8px">${pillLabel(i)}</span> <span>${t.team}</span> </button>`).join(''); document.getElementById('team-dropdown').classList.add('open');
const caret = document.getElementById('hdr-dd-caret'); if (caret) caret.classList.add('open');}

function closeTeamDropdown() {
  _teamDdOpen = false;
  document.getElementById('team-dropdown').classList.remove('open');
  const caret = document.getElementById('hdr-dd-caret');
  if (caret) caret.classList.remove('open');
}

function selectTeamEntry(idx) {
  activeTeamIdx = idx;
  saveUser();
  updateHeaderDisplay();
  updateLbSeg();
  renderAll();
  closeTeamDropdown();
  showToast(idx === -1 ? '✓ All Picks' : '✓ ' + currentUserTeams[idx].team);
}

async function initApp() { ENTRIES.forEach(e => { e.picks = e.picks.map(resolvePlayerName); }); allTeamEmails = [...new Set(ENTRIES.map(e => e.email))].sort(); OWNERSHIP_DATA = computeOwnership(); console.log('✅ Loaded', ENTRIES.length, 'baked-in entries');
const returning = loadUser(); if (returning) console.log('👤 Returning user:', currentUserEmail); updateLbSeg(); Object.keys(FLAGS).forEach(name => { if (!GOLFER_SCORES[name]) { GOLFER_SCORES[name] = { pos:'—', score:0, thru:'—', teeTime:'—', r1:null, r2:null, r3:null, r4:null }; } }); renderAll(); await fetchESPN().catch(() => { setApiStatus('cached', 'Offline'); }); renderAll(); startAutoRefresh(); startAgeTimer();}initApp();document.addEventListener('click', function(e) { if (_teamDdOpen && !e.target.closest('#hdr-team-display') && !e.target.closest('#team-dropdown')) { closeTeamDropdown(); }});
</script>
