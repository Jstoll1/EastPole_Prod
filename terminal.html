<!DOCTYPE html>
<html lang="en" data-theme="terminal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1.0">
<title>East Pole Terminal</title>
<meta name="description" content="East Pole Golf Pool — Desktop Terminal">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/terminal.css?v=25">
<script data-goatcounter="https://calcutta.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</head>
<body>

<div id="term-status-bar">
<div class="tsb-left">
<span class="tsb-brand">EAST POLE</span>
<span class="tsb-sep">|</span>
<span class="tsb-label">TOURNEY:</span>
<span id="tsb-tourney">—</span>
<span class="tsb-sep">|</span>
<span class="tsb-label">RND:</span>
<span id="tsb-round">—</span>
<span class="tsb-sep">|</span>
<span class="tsb-label">STATUS:</span>
<span id="tsb-status">LOADING</span>
</div>
<div class="tsb-right">
<span class="tsb-label">UPDATED:</span>
<span id="tsb-updated">—</span>
<span class="tsb-sep">|</span>
<span id="tsb-time">--:--:--</span>
<span class="tsb-sep">|</span>
<button onclick="openAddEntryTerm()" class="tsb-btn">+ ADD ENTRY</button>
<span class="tsb-sep">|</span>
<button onclick="handleRefreshClick()" class="tsb-btn">REFRESH</button>
</div>
</div>

<div id="term-addentry-backdrop" onclick="closeAddEntryTerm()" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.75);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)"></div>
<div id="term-addentry-overlay" style="display:none;position:fixed;inset:24px;z-index:9999;background:var(--term-bg,#0a0e12);border:1px solid var(--term-amber,#d4a843);box-shadow:0 16px 48px rgba(0,0,0,0.8);flex-direction:column">
<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--term-border,#2a3440);background:var(--term-bg,#0a0e12)">
<span style="font-family:var(--term-font,monospace);font-weight:700;color:var(--term-amber,#d4a843);letter-spacing:1px">+ ADD ENTRY</span>
<button onclick="closeAddEntryTerm()" class="tsb-btn">CLOSE ✕</button>
</div>
<div id="term-entry-form-container" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 24px 40px"></div>
</div>

<div id="term-wx-bar"><span class="wxb-tag">NEXT</span> <span class="wxb-course">loading…</span></div>

<div id="term-ticker">
<div class="tt-label">LIVE FEED</div>
<div class="tt-track"><div class="tt-content" id="tt-content"></div></div>
</div>

<div id="term-grid">

<!-- Panel 1: Leaderboard -->
<section class="term-panel" id="panel-leaderboard">
<header class="tp-header">
<span class="tp-title">F1 · LEADERBOARD</span>
<input type="text" id="lb-search" class="tp-search" placeholder="search…" oninput="onLbSearch(this.value)" onkeydown="if(event.key==='Escape'){this.value='';onLbSearch('')}">
<span class="tp-meta" id="lb-meta">—</span>
</header>
<div id="term-lb-final" class="lbf-banner" style="display:none"></div>
<div class="tp-body">
<table class="tp-table">
<thead><tr>
<th class="tpt-pos" data-col="pos">POS</th>
<th class="tpt-name" data-col="name">PLAYER</th>
<th class="tpt-score" data-col="score">SCORE</th>
<th class="tpt-today" data-col="today">TODAY</th>
<th class="tpt-thru" data-col="thru">THRU</th>
</tr></thead>
<tbody id="term-lb-body"></tbody>
</table>
</div>
</section>

<!-- Panel 2: Standings -->
<section class="term-panel" id="panel-standings">
<header class="tp-header">
<span class="tp-title">F2 · POOL STANDINGS</span>
<span class="tp-meta" id="std-meta">—</span>
</header>
<div id="pool-roster"></div>
<div class="tp-body">
<table class="tp-table">
<thead><tr>
<th class="tpt-pos" data-col="rank">RK</th>
<th class="tpt-name" data-col="team">ENTRY</th>
<th class="tpt-score" data-col="total">TOT</th>
<th class="tpt-today" data-col="today">TODAY</th>
<th class="tpt-thru" data-col="holes">HLS</th>
</tr></thead>
<tbody id="term-std-body"></tbody>
</table>
</div>
</section>

<!-- Panel 3: Activity Feed -->
<section class="term-panel" id="panel-activity">
<header class="tp-header">
<span class="tp-title">F3 · MOVERS</span>
<span class="tp-meta" id="act-meta">—</span>
</header>
<div class="tp-body tp-body-feed">
<div id="term-act-body"></div>
</div>
</section>

<!-- Panel 4: My Entries -->
<section class="term-panel" id="panel-my">
<header class="tp-header">
<span class="tp-title">F4 · MY ENTRIES</span>
<span class="tp-meta" id="my-meta">—</span>
</header>
<div class="tp-body">
<div id="term-my-body"></div>
</div>
</section>

<!-- Panel 5: DataGolf Odds -->
<section class="term-panel" id="panel-datagolf">
<header class="tp-header">
<span class="tp-title">F5 · DATAGOLF ODDS</span>
<span class="tp-meta" id="dg-meta">—</span>
</header>
<div class="tp-body">
<table class="tp-table">
<thead><tr>
<th class="tpt-name" data-col="name">PLAYER</th>
<th class="tpt-dg" data-col="make_cut">MC</th>
<th class="tpt-dg" data-col="top_20">T20</th>
<th class="tpt-dg" data-col="top_10">T10</th>
<th class="tpt-dg" data-col="top_5">T5</th>
<th class="tpt-dg" data-col="win">WIN</th>
</tr></thead>
<tbody id="term-dg-body"></tbody>
</table>
</div>
</section>

<!-- Panel 6 removed: DataGolf Odds now occupies the bottom-right slot -->

</div>

<!-- Minimal toast -->
<div id="term-toast"></div>

<!-- Data layer (shared) -->
<script defer src="./js/state.js?v=640"></script>
<script defer src="./js/utils.js?v=637"></script>
<script defer src="./js/api.js?v=653"></script>
<script defer src="./js/ui-scorecard.js?v=637"></script>

<!-- Terminal-only module -->
<script defer src="./js/entry-form.js?v=2"></script>
<script defer src="./js/entry-loader.js?v=2"></script>
<script defer src="./js/terminal.js?v=33"></script>

</body>
</html>
